services:
    
  inventoryservice:
    image: inventoryservice
    build:
      context: .
      dockerfile: InventoryService/Dockerfile
    depends_on:
      - inventory-db
    environment:
      - ConnectionStrings__DefaultConnection=Host=inventory-db;Port=5432;Database=inventorydb;Username=inventory-user;Password=inventory-1234

  orderservice:
    image: orderservice
    build:
      context: .
      dockerfile: OrderService/Dockerfile
    depends_on:
      - order-db
    environment:
      - ConnectionStrings__DefaultConnection=Host=order-db;Port=5432;Database=orderdb;Username=order-user;Password=order-1234

  gateway:
    image: gateway
    build:
      context: .
      dockerfile: Gateway/Dockerfile
    depends_on:
      - orderservice
      - inventoryservice
    ports:
      - "5000:8080"

  order-db:
    image: postgres:16
    container_name: order-db
    restart: always
    environment:
      POSTGRES_DB: orderdb
      POSTGRES_USER: order-user
      POSTGRES_PASSWORD: order-1234
    ports:
      - "5433:5432"
    volumes:
      - order_data:/var/lib/postgresql/data
        
  inventory-db:
    image: postgres:16
    container_name: inventory-db
    restart: always
    environment:
      POSTGRES_DB: inventorydb
      POSTGRES_USER: inventory-user
      POSTGRES_PASSWORD: inventory-1234
    ports:
      - "5432:5432"
    volumes:
      - invetory_data:/var/lib/postgresql/data
      
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
        
volumes:
  order_data:
  invetory_data: